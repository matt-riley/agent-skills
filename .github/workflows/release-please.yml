name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    permissions:
      contents: write
      issues: write
      pull-requests: write
    uses: matt-riley/matt-riley-ci/.github/workflows/release-please.yml@098848d01b058526398113ee20eccadf30f4b881 # v1.9.2
    with:
      config-file: release-please-config.json
      manifest-file: .release-please-manifest.json
      cancel-in-progress: true
    secrets:
      token: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}

  publish-package:
    name: Publish root package
    needs: release
    if: ${{ needs.release.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release.outputs.tag_name }}

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "24"
          registry-url: https://npm.pkg.github.com
          scope: "@matt-riley"

      - name: Verify tag matches package version
        env:
          EMITTED_TAG: ${{ needs.release.outputs.tag_name }}
        run: |
          package_version="$(jq -r '.version' package.json)"
          if [[ "$EMITTED_TAG" != *"$package_version" ]]; then
            echo "::error::Release tag $EMITTED_TAG does not end with package version $package_version."
            exit 1
          fi

      - name: Publish package
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}
