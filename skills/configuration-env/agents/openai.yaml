interface:
  display_name: 'Configuration & Environment'
  short_description: 'Configure an application safely via environment variables, .env files, and repo-owned runtime config such as Wrangler bindings. Use when the server will not start, behavior differs between environments, or when bootstrapping a new deployment environment. This is an operational guardrail, not a substitute for full security review or multi-service bootstrap guidance.'
policy:
  allow_implicit_invocation: true
