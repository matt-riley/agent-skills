interface:
  display_name: "Find Skills"
  short_description: "Helps users discover skills in the local agent-skills catalog when they ask questions like \"how do I do X\", \"find a skill for X\", \"is there a skill that can...\", or express interest in extending capabilities. This skill should be used when the user is looking for functionality that might exist as an already-available local skill."
policy:
  allow_implicit_invocation: false
