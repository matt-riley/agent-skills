interface:
  display_name: Testing Workflows
  short_description: Write, run, and debug Go tests — unit and integration — including
    generator refresh when stale generated code causes failures. Use when adding test
    coverage or debugging test failures in domain logic, repositories, or handlers.
    For build failures, toolchain issues, or CI-parity problems, use go-build-and-test
    instead.
policy:
  allow_implicit_invocation: true
